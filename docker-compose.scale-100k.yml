services:
  auth-service:
    ports: !reset []
    cpus: ${AUTH_SERVICE_CPUS:-1.00}
    mem_limit: ${AUTH_SERVICE_MEMORY:-768m}
    environment:
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${AUTH_DB_POOL_SIZE:-8}
      JAVA_TOOL_OPTIONS: ${AUTH_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    deploy:
      replicas: 2

  catalog-service:
    ports: !reset []
    cpus: ${CATALOG_SERVICE_CPUS:-1.00}
    mem_limit: ${CATALOG_SERVICE_MEMORY:-768m}
    environment:
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${CATALOG_DB_POOL_SIZE:-10}
      JAVA_TOOL_OPTIONS: ${CATALOG_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    deploy:
      replicas: 3

  streaming-service:
    ports: !reset []
    cpus: ${STREAMING_SERVICE_CPUS:-1.00}
    mem_limit: ${STREAMING_SERVICE_MEMORY:-768m}
    environment:
      SPRING_KAFKA_PRODUCER_PROPERTIES_LINGER_MS: ${STREAMING_KAFKA_LINGER_MS:-10}
      SPRING_KAFKA_PRODUCER_PROPERTIES_BATCH_SIZE: ${STREAMING_KAFKA_BATCH_SIZE:-65536}
      SPRING_KAFKA_PRODUCER_PROPERTIES_COMPRESSION_TYPE: ${STREAMING_KAFKA_COMPRESSION:-lz4}
      JAVA_TOOL_OPTIONS: ${STREAMING_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    deploy:
      replicas: 6

  playlist-service:
    ports: !reset []
    cpus: ${PLAYLIST_SERVICE_CPUS:-1.00}
    mem_limit: ${PLAYLIST_SERVICE_MEMORY:-768m}
    environment:
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${PLAYLIST_DB_POOL_SIZE:-8}
      JAVA_TOOL_OPTIONS: ${PLAYLIST_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    deploy:
      replicas: 2

  search-service:
    ports: !reset []
    cpus: ${SEARCH_SERVICE_CPUS:-1.00}
    mem_limit: ${SEARCH_SERVICE_MEMORY:-768m}
    environment:
      SEARCH_INDEXING_ENABLED: ${SEARCH_INDEXING_ENABLED:-false}
      JAVA_TOOL_OPTIONS: ${SEARCH_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    deploy:
      replicas: 3

  analytics-service:
    ports: !reset []
    cpus: ${ANALYTICS_SERVICE_CPUS:-1.00}
    mem_limit: ${ANALYTICS_SERVICE_MEMORY:-768m}
    environment:
      SPRING_KAFKA_LISTENER_CONCURRENCY: ${ANALYTICS_KAFKA_LISTENER_CONCURRENCY:-3}
      JAVA_TOOL_OPTIONS: ${ANALYTICS_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    deploy:
      replicas: 2

  recommendation-service:
    ports: !reset []
    cpus: ${RECOMMENDATION_SERVICE_CPUS:-1.00}
    mem_limit: ${RECOMMENDATION_SERVICE_MEMORY:-768m}
    environment:
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${RECOMMENDATION_DB_POOL_SIZE:-8}
      SPRING_KAFKA_LISTENER_CONCURRENCY: ${RECOMMENDATION_KAFKA_LISTENER_CONCURRENCY:-3}
      JAVA_TOOL_OPTIONS: ${RECOMMENDATION_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    deploy:
      replicas: 3

  notification-service:
    ports: !reset []
    cpus: ${NOTIFICATION_SERVICE_CPUS:-0.50}
    mem_limit: ${NOTIFICATION_SERVICE_MEMORY:-512m}
    environment:
      SPRING_KAFKA_LISTENER_CONCURRENCY: ${NOTIFICATION_KAFKA_LISTENER_CONCURRENCY:-1}
      JAVA_TOOL_OPTIONS: ${NOTIFICATION_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    deploy:
      replicas: 1

  kafka:
    cpus: ${KAFKA_CPUS:-2.00}
    mem_limit: ${KAFKA_MEMORY:-2g}

  search-opensearch:
    cpus: ${OPENSEARCH_CPUS:-2.00}
    mem_limit: ${OPENSEARCH_MEMORY:-4g}
    environment:
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms1g -Xmx1g}

  analytics-db:
    cpus: ${CLICKHOUSE_CPUS:-2.00}
    mem_limit: ${CLICKHOUSE_MEMORY:-4g}

  recommendation-redis:
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-768mb}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}

  frontend:
    build:
      args:
        VITE_AUTH_API_BASE_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8080}
        VITE_CATALOG_API_BASE_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8080}
        VITE_STREAMING_API_BASE_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8080}
        VITE_PLAYLIST_API_BASE_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8080}
        VITE_SEARCH_API_BASE_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8080}
        VITE_ANALYTICS_API_BASE_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8080}
        VITE_RECOMMENDATION_API_BASE_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8080}
    environment:
      VITE_AUTH_API_BASE_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8080}
      VITE_CATALOG_API_BASE_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8080}
      VITE_STREAMING_API_BASE_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8080}
      VITE_PLAYLIST_API_BASE_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8080}
      VITE_SEARCH_API_BASE_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8080}
      VITE_ANALYTICS_API_BASE_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8080}
      VITE_RECOMMENDATION_API_BASE_URL: ${GATEWAY_PUBLIC_URL:-http://localhost:8080}
