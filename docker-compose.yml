name: benchmark-application

x-app-base: &app-base
  restart: unless-stopped
  networks:
    - benchmark-network
  cpus: ${DEFAULT_SERVICE_CPUS:-0.50}
  mem_limit: ${DEFAULT_SERVICE_MEMORY:-512m}
  healthcheck:
    test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health | grep -q UP"]
    interval: 10s
    timeout: 5s
    retries: 30
    start_period: 30s
  volumes:
    - ./config/jwt/public.pem:/run/config/jwt/public.pem:ro

x-postgres: &postgres
  image: postgres:16-alpine
  restart: unless-stopped
  networks:
    - benchmark-network
  cpus: ${INFRA_CPUS:-1.00}
  mem_limit: ${INFRA_MEMORY:-1g}
  environment:
    POSTGRES_USER: ${POSTGRES_USER:-benchmark}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-benchmark}
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
    interval: 10s
    timeout: 5s
    retries: 10

services:
  auth-service:
    <<: *app-base
    build:
      context: ./services/auth-service
      args:
        SERVICE_NAME: auth-service
    ports:
      - "${AUTH_SERVICE_HOST_PORT:-8081}:8080"
    environment:
      SERVICE_NAME: auth-service
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-benchmark}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-benchmark}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/run/config/jwt/public.pem}
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/run/secrets/jwt/private.pem}
      JWT_ISSUER: ${JWT_ISSUER:-benchmark-auth}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL:-PT1H}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${AUTH_DB_POOL_SIZE:-10}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${DB_CONNECTION_TIMEOUT_MS:-2000}
      JAVA_TOOL_OPTIONS: ${AUTH_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    volumes:
      - ./config/jwt/public.pem:/run/config/jwt/public.pem:ro
      - ./config/jwt/private.pem:/run/secrets/jwt/private.pem:ro
    depends_on:
      auth-db:
        condition: service_healthy

  catalog-service:
    <<: *app-base
    build:
      context: ./services/catalog-service
      args:
        SERVICE_NAME: catalog-service
    ports:
      - "${CATALOG_SERVICE_HOST_PORT:-8082}:8080"
    environment:
      SERVICE_NAME: catalog-service
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://catalog-db:5432/catalog
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-benchmark}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-benchmark}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/run/config/jwt/public.pem}
      CATALOG_DATASET_PATH: ${CATALOG_DATASET_PATH:-/app/data/catalog.csv}
      CATALOG_INGESTION_ENABLED: ${CATALOG_INGESTION_ENABLED:-true}
      CATALOG_DEFAULT_PAGE_SIZE: ${CATALOG_DEFAULT_PAGE_SIZE:-20}
      CATALOG_MAX_PAGE_SIZE: ${CATALOG_MAX_PAGE_SIZE:-100}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${CATALOG_DB_POOL_SIZE:-10}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${DB_CONNECTION_TIMEOUT_MS:-2000}
      JAVA_TOOL_OPTIONS: ${CATALOG_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    depends_on:
      catalog-db:
        condition: service_healthy

  streaming-service:
    <<: *app-base
    build:
      context: ./services/streaming-service
      args:
        SERVICE_NAME: streaming-service
    ports:
      - "${STREAMING_SERVICE_HOST_PORT:-8083}:8080"
    environment:
      SERVICE_NAME: streaming-service
      SERVER_PORT: 8080
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/run/config/jwt/public.pem}
      STREAMING_PLAYBACK_EVENTS_TOPIC: ${STREAMING_PLAYBACK_EVENTS_TOPIC:-playback-events}
      STREAMING_SEGMENT_COUNT: ${STREAMING_SEGMENT_COUNT:-5}
      STREAMING_SEGMENT_SIZE_BYTES: ${STREAMING_SEGMENT_SIZE_BYTES:-65536}
      SPRING_KAFKA_PRODUCER_PROPERTIES_LINGER_MS: ${STREAMING_KAFKA_LINGER_MS:-5}
      SPRING_KAFKA_PRODUCER_PROPERTIES_BATCH_SIZE: ${STREAMING_KAFKA_BATCH_SIZE:-32768}
      SPRING_KAFKA_PRODUCER_PROPERTIES_COMPRESSION_TYPE: ${STREAMING_KAFKA_COMPRESSION:-lz4}
      SPRING_KAFKA_PRODUCER_PROPERTIES_REQUEST_TIMEOUT_MS: ${STREAMING_KAFKA_REQUEST_TIMEOUT_MS:-30000}
      SPRING_KAFKA_PRODUCER_PROPERTIES_DELIVERY_TIMEOUT_MS: ${STREAMING_KAFKA_DELIVERY_TIMEOUT_MS:-120000}
      JAVA_TOOL_OPTIONS: ${STREAMING_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    depends_on:
      kafka:
        condition: service_started

  playlist-service:
    <<: *app-base
    build:
      context: ./services/playlist-service
      args:
        SERVICE_NAME: playlist-service
    ports:
      - "${PLAYLIST_SERVICE_HOST_PORT:-8084}:8080"
    environment:
      SERVICE_NAME: playlist-service
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://playlist-db:5432/playlist
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-benchmark}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-benchmark}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/run/config/jwt/public.pem}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${PLAYLIST_DB_POOL_SIZE:-10}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${DB_CONNECTION_TIMEOUT_MS:-2000}
      JAVA_TOOL_OPTIONS: ${PLAYLIST_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    depends_on:
      playlist-db:
        condition: service_healthy

  search-service:
    <<: *app-base
    build:
      context: ./services/search-service
      args:
        SERVICE_NAME: search-service
    ports:
      - "${SEARCH_SERVICE_HOST_PORT:-8085}:8080"
    environment:
      SERVICE_NAME: search-service
      SERVER_PORT: 8080
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/run/config/jwt/public.pem}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://search-opensearch:9200}
      SEARCH_INDEX_NAME: ${SEARCH_INDEX_NAME:-songs}
      SEARCH_CATALOG_DATASET_PATH: ${SEARCH_CATALOG_DATASET_PATH:-/app/data/catalog.csv}
      SEARCH_INDEXING_ENABLED: ${SEARCH_INDEXING_ENABLED:-true}
      SEARCH_INDEX_BATCH_SIZE: ${SEARCH_INDEX_BATCH_SIZE:-500}
      SEARCH_DEFAULT_PAGE_SIZE: ${SEARCH_DEFAULT_PAGE_SIZE:-20}
      SEARCH_MAX_PAGE_SIZE: ${SEARCH_MAX_PAGE_SIZE:-100}
      JAVA_TOOL_OPTIONS: ${SEARCH_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    volumes:
      - ./config/jwt/public.pem:/run/config/jwt/public.pem:ro
      - ./services/catalog-service/data/catalog.csv:/app/data/catalog.csv:ro
    depends_on:
      search-opensearch:
        condition: service_healthy

  analytics-service:
    <<: *app-base
    build:
      context: ./services/analytics-service
      args:
        SERVICE_NAME: analytics-service
    ports:
      - "${ANALYTICS_SERVICE_HOST_PORT:-8086}:8080"
    environment:
      SERVICE_NAME: analytics-service
      SERVER_PORT: 8080
      CLICKHOUSE_URL: jdbc:clickhouse://analytics-db:8123/analytics
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-benchmark}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-benchmark}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/run/config/jwt/public.pem}
      ANALYTICS_PLAYBACK_EVENTS_TOPIC: ${ANALYTICS_PLAYBACK_EVENTS_TOPIC:-playback-events}
      ANALYTICS_KAFKA_CONSUMER_GROUP_ID: ${ANALYTICS_KAFKA_CONSUMER_GROUP_ID:-analytics-service}
      ANALYTICS_DEFAULT_PAGE_SIZE: ${ANALYTICS_DEFAULT_PAGE_SIZE:-20}
      ANALYTICS_MAX_PAGE_SIZE: ${ANALYTICS_MAX_PAGE_SIZE:-100}
      ANALYTICS_GLOBAL_CHART_LIMIT: ${ANALYTICS_GLOBAL_CHART_LIMIT:-50}
      SPRING_KAFKA_LISTENER_CONCURRENCY: ${ANALYTICS_KAFKA_LISTENER_CONCURRENCY:-1}
      JAVA_TOOL_OPTIONS: ${ANALYTICS_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    depends_on:
      analytics-db:
        condition: service_healthy
      kafka:
        condition: service_started

  recommendation-service:
    <<: *app-base
    build:
      context: ./services/recommendation-service
      args:
        SERVICE_NAME: recommendation-service
    ports:
      - "${RECOMMENDATION_SERVICE_HOST_PORT:-8087}:8080"
    environment:
      SERVICE_NAME: recommendation-service
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://recommendation-db:5432/recommendation
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-benchmark}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-benchmark}
      REDIS_URL: redis://recommendation-redis:6379
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/run/config/jwt/public.pem}
      RECOMMENDATION_PLAYBACK_EVENTS_TOPIC: ${RECOMMENDATION_PLAYBACK_EVENTS_TOPIC:-playback-events}
      RECOMMENDATION_KAFKA_CONSUMER_GROUP_ID: ${RECOMMENDATION_KAFKA_CONSUMER_GROUP_ID:-recommendation-service}
      RECOMMENDATION_DEFAULT_LIMIT: ${RECOMMENDATION_DEFAULT_LIMIT:-10}
      RECOMMENDATION_MAX_LIMIT: ${RECOMMENDATION_MAX_LIMIT:-50}
      RECOMMENDATION_CACHE_TTL: ${RECOMMENDATION_CACHE_TTL:-PT5M}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${RECOMMENDATION_DB_POOL_SIZE:-10}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${DB_CONNECTION_TIMEOUT_MS:-2000}
      SPRING_KAFKA_LISTENER_CONCURRENCY: ${RECOMMENDATION_KAFKA_LISTENER_CONCURRENCY:-1}
      JAVA_TOOL_OPTIONS: ${RECOMMENDATION_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    depends_on:
      recommendation-db:
        condition: service_healthy
      recommendation-redis:
        condition: service_started
      kafka:
        condition: service_started

  notification-service:
    <<: *app-base
    build:
      context: ./services/notification-service
      args:
        SERVICE_NAME: notification-service
    ports:
      - "${NOTIFICATION_SERVICE_HOST_PORT:-8088}:8080"
    environment:
      SERVICE_NAME: notification-service
      SERVER_PORT: 8080
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-benchmark}:${MONGO_INITDB_ROOT_PASSWORD:-benchmark}@notification-db:27017/notification?authSource=admin
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/run/config/jwt/public.pem}
      NOTIFICATION_PLAYLIST_EVENTS_TOPIC: ${NOTIFICATION_PLAYLIST_EVENTS_TOPIC:-playlist-events}
      NOTIFICATION_KAFKA_CONSUMER_GROUP_ID: ${NOTIFICATION_KAFKA_CONSUMER_GROUP_ID:-notification-service}
      SPRING_KAFKA_LISTENER_CONCURRENCY: ${NOTIFICATION_KAFKA_LISTENER_CONCURRENCY:-1}
      JAVA_TOOL_OPTIONS: ${NOTIFICATION_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=70}
    depends_on:
      notification-db:
        condition: service_started
      kafka:
        condition: service_started

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks:
      - benchmark-network
    ports:
      - "${GATEWAY_HOST_PORT:-8080}:8080"
    cpus: ${GATEWAY_CPUS:-1.00}
    mem_limit: ${GATEWAY_MEMORY:-256m}
    ulimits:
      nofile:
        soft: ${GATEWAY_NOFILE_SOFT:-200000}
        hard: ${GATEWAY_NOFILE_HARD:-200000}
    volumes:
      - ./config/nginx/gateway.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/proxy_params:/etc/nginx/proxy_params:ro
      - gateway-cache:/var/cache/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    depends_on:
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      streaming-service:
        condition: service_healthy
      playlist-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      recommendation-service:
        condition: service_healthy

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    restart: unless-stopped
    networks:
      - benchmark-network
    command:
      - --nginx.scrape-uri=http://gateway:8080/nginx_status
    cpus: ${EXPORTER_CPUS:-0.25}
    mem_limit: ${EXPORTER_MEMORY:-128m}
    depends_on:
      gateway:
        condition: service_healthy

  auth-db:
    <<: *postgres
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: ${POSTGRES_USER:-benchmark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-benchmark}
    volumes:
      - auth-db-data:/var/lib/postgresql/data

  catalog-db:
    <<: *postgres
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: ${POSTGRES_USER:-benchmark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-benchmark}
    volumes:
      - catalog-db-data:/var/lib/postgresql/data

  playlist-db:
    <<: *postgres
    environment:
      POSTGRES_DB: playlist
      POSTGRES_USER: ${POSTGRES_USER:-benchmark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-benchmark}
    volumes:
      - playlist-db-data:/var/lib/postgresql/data

  recommendation-db:
    <<: *postgres
    environment:
      POSTGRES_DB: recommendation
      POSTGRES_USER: ${POSTGRES_USER:-benchmark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-benchmark}
    volumes:
      - recommendation-db-data:/var/lib/postgresql/data

  recommendation-redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - benchmark-network
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    cpus: ${INFRA_CPUS:-1.00}
    mem_limit: ${INFRA_MEMORY:-1g}
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    volumes:
      - recommendation-redis-data:/data

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    restart: unless-stopped
    networks:
      - benchmark-network
    environment:
      REDIS_ADDR: redis://recommendation-redis:6379
    cpus: ${EXPORTER_CPUS:-0.25}
    mem_limit: ${EXPORTER_MEMORY:-128m}
    depends_on:
      recommendation-redis:
        condition: service_started

  search-opensearch:
    image: opensearchproject/opensearch:2.13.0
    restart: unless-stopped
    networks:
      - benchmark-network
    ports:
      - "${OPENSEARCH_HOST_PORT:-9200}:9200"
    cpus: ${INFRA_CPUS:-1.00}
    mem_limit: ${OPENSEARCH_MEMORY:-2g}
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-BenchmarkAdmin123!}
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - search-opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  analytics-db:
    image: clickhouse/clickhouse-server:24.3-alpine
    restart: unless-stopped
    networks:
      - benchmark-network
    ports:
      - "${CLICKHOUSE_HTTP_HOST_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_HOST_PORT:-9000}:9000"
    cpus: ${INFRA_CPUS:-1.00}
    mem_limit: ${CLICKHOUSE_MEMORY:-2g}
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-benchmark}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-benchmark}
    volumes:
      - analytics-db-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- \"http://127.0.0.1:8123/?user=$${CLICKHOUSE_USER}&password=$${CLICKHOUSE_PASSWORD}&query=SELECT%201\" | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  notification-db:
    image: mongo:7
    restart: unless-stopped
    networks:
      - benchmark-network
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    cpus: ${INFRA_CPUS:-1.00}
    mem_limit: ${INFRA_MEMORY:-1g}
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-benchmark}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-benchmark}
    volumes:
      - notification-db-data:/data/db

  kafka:
    image: apache/kafka:3.7.0
    restart: unless-stopped
    networks:
      - benchmark-network
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    cpus: ${INFRA_CPUS:-1.00}
    mem_limit: ${KAFKA_MEMORY:-1g}
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # MANUAL CHANGE
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-init:
    image: apache/kafka:3.7.0
    restart: "no"
    networks:
      - benchmark-network
    depends_on:
      kafka:
        condition: service_started
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic "$${PLAYBACK_TOPIC}" --partitions "$${PLAYBACK_PARTITIONS}" --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic "$${PLAYLIST_TOPIC}" --partitions "$${PLAYLIST_PARTITIONS}" --replication-factor 1
    environment:
      PLAYBACK_TOPIC: ${STREAMING_PLAYBACK_EVENTS_TOPIC:-playback-events}
      PLAYBACK_PARTITIONS: ${PLAYBACK_EVENTS_PARTITIONS:-6}
      PLAYLIST_TOPIC: ${NOTIFICATION_PLAYLIST_EVENTS_TOPIC:-playlist-events}
      PLAYLIST_PARTITIONS: ${PLAYLIST_EVENTS_PARTITIONS:-3}

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    restart: unless-stopped
    networks:
      - benchmark-network
    command:
      - --kafka.server=kafka:9092
    cpus: ${EXPORTER_CPUS:-0.25}
    mem_limit: ${EXPORTER_MEMORY:-128m}
    depends_on:
      kafka:
        condition: service_started

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    networks:
      - benchmark-network
    ports:
      - "${CADVISOR_HOST_PORT:-8089}:8080"
    cpus: ${EXPORTER_CPUS:-0.25}
    mem_limit: ${EXPORTER_MEMORY:-256m}
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    networks:
      - benchmark-network
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    cpus: ${INFRA_CPUS:-1.00}
    mem_limit: ${PROMETHEUS_MEMORY:-512m}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    networks:
      - benchmark-network
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3000"
    cpus: ${INFRA_CPUS:-1.00}
    mem_limit: ${GRAFANA_MEMORY:-512m}
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

  k6:
    image: grafana/k6:0.49.0
    restart: "no"
    networks:
      - benchmark-network
    cpus: ${DEFAULT_SERVICE_CPUS:-0.50}
    mem_limit: ${K6_MEMORY:-512m}
    entrypoint:
      - k6
    command:
      - version
    environment:
      BASE_URL: ${K6_BASE_URL:-http://gateway:8080}
      TARGET_REGISTERED_USERS: ${TARGET_REGISTERED_USERS:-1000000}
      TARGET_DAU: ${TARGET_DAU:-100000}
      TARGET_PEAK_CONCURRENT_USERS: ${TARGET_PEAK_CONCURRENT_USERS:-20000}
      TARGET_PLAYBACK_EVENTS_PER_SECOND: ${TARGET_PLAYBACK_EVENTS_PER_SECOND:-40000}
      TARGET_AUTH_LOGINS_PER_SECOND: ${TARGET_AUTH_LOGINS_PER_SECOND:-500}
      TARGET_CATALOG_SEARCH_RPS: ${TARGET_CATALOG_SEARCH_RPS:-4000}
      TARGET_PLAYLIST_MUTATIONS_PER_SECOND: ${TARGET_PLAYLIST_MUTATIONS_PER_SECOND:-200}
    volumes:
      - ./load-generator/k6:/scripts:ro
    depends_on:
      gateway:
        condition: service_healthy

networks:
