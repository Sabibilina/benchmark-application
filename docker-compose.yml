networks:
  music-net:
    driver: bridge

volumes:
  jwt-keys:
  auth-db-data:
  catalog-db-data:
  playlist-db-data:
  recommendation-db-data:
  opensearch-data:
  clickhouse-data:
  redis-data:
  mongo-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
  prometheus-data:
  grafana-data:

services:

  # ── Zookeeper ─────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:${CONFLUENT_VERSION:-7.6.0}
    container_name: zookeeper
    networks: [music-net]
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "*"
    ports:
      - "${ZOOKEEPER_HOST_PORT:-2181}:2181"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q 'Zookeeper version' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Kafka ─────────────────────────────────────────────────────────────────

  kafka:
    image: confluentinc/cp-kafka:${CONFLUENT_VERSION:-7.6.0}
    container_name: kafka
    networks: [music-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Disable auto-creation so init-kafka controls partition counts precisely.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-2}
      KAFKA_LOG_RETENTION_BYTES: ${KAFKA_LOG_RETENTION_BYTES:-536870912}
      KAFKA_MESSAGE_MAX_BYTES: 1048576
      KAFKA_REPLICA_FETCH_MAX_BYTES: 1048576
    ports:
      - "${KAFKA_HOST_PORT:-29092}:29092"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Kafka topic initialiser (one-shot) ────────────────────────────────────
  # Creates topics with production-appropriate partition counts before any
  # producer or consumer starts.  Partition counts are sized for the target
  # replica counts:
  #   playback-events  → 12 partitions  (analytics × 4  + recommendation × 3)
  #   playlist-events  →  6 partitions  (notification × 2, headroom to 6)
  # Services that produce/consume Kafka MUST depend on init-kafka completing.

  init-kafka:
    image: confluentinc/cp-kafka:${CONFLUENT_VERSION:-7.6.0}
    container_name: init-kafka
    networks: [music-net]
    depends_on:
      kafka:
        condition: service_healthy
    # Override the Confluent entrypoint so we can run kafka-topics directly.
    # The default entrypoint (/etc/confluent/docker/run) starts a Kafka broker.
    #
    # The script MUST live as the third element of the entrypoint list.
    # If it is placed in `command:` instead, Docker Compose tokenises the string
    # into a list, and bash -c receives only the first token as the script to
    # execute (the rest become $0, $1 … positional parameters that are never
    # used), causing kafka-topics to be called with no arguments.
    entrypoint:
      - /bin/bash
      - -c
      - >-
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists
        --topic ${KAFKA_TOPIC_PLAYBACK_EVENTS:-playback-events}
        --partitions ${PLAYBACK_EVENTS_PARTITIONS:-12}
        --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists
        --topic ${KAFKA_TOPIC_PLAYLIST_EVENTS:-playlist-events}
        --partitions ${PLAYLIST_EVENTS_PARTITIONS:-6}
        --replication-factor 1 &&
        echo 'Kafka topics ready.' &&
        kafka-topics --bootstrap-server kafka:9092 --list
    restart: "no"

  # ── PostgreSQL databases (one per service) ────────────────────────────────

  auth-db:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: auth-db
    networks: [music-net]
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-authdb}
      POSTGRES_USER: ${AUTH_DB_USER:-authuser}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-authpass}
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c max_connections=200
        -c effective_cache_size=512MB
    ports:
      - "${AUTH_DB_HOST_PORT:-5432}:5432"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-authuser} -d ${AUTH_DB_NAME:-authdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  catalog-db:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: catalog-db
    networks: [music-net]
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${CATALOG_DB_NAME:-catalogdb}
      POSTGRES_USER: ${CATALOG_DB_USER:-cataloguser}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD:-catalogpass}
    command: >
      postgres
        -c shared_buffers=512MB
        -c work_mem=32MB
        -c max_connections=200
        -c effective_cache_size=1GB
        -c random_page_cost=1.1
    ports:
      - "${CATALOG_DB_HOST_PORT:-5433}:5432"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_DB_USER:-cataloguser} -d ${CATALOG_DB_NAME:-catalogdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  playlist-db:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: playlist-db
    networks: [music-net]
    volumes:
      - playlist-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${PLAYLIST_DB_NAME:-playlistdb}
      POSTGRES_USER: ${PLAYLIST_DB_USER:-playlistuser}
      POSTGRES_PASSWORD: ${PLAYLIST_DB_PASSWORD:-playlistpass}
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c max_connections=200
        -c effective_cache_size=512MB
    ports:
      - "${PLAYLIST_DB_HOST_PORT:-5434}:5432"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLAYLIST_DB_USER:-playlistuser} -d ${PLAYLIST_DB_NAME:-playlistdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  recommendation-db:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: recommendation-db
    networks: [music-net]
    volumes:
      - recommendation-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${RECOMMENDATION_DB_NAME:-recommendationdb}
      POSTGRES_USER: ${RECOMMENDATION_DB_USER:-recommendationuser}
      POSTGRES_PASSWORD: ${RECOMMENDATION_DB_PASSWORD:-recommendationpass}
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c max_connections=200
        -c effective_cache_size=512MB
    ports:
      - "${RECOMMENDATION_DB_HOST_PORT:-5435}:5432"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RECOMMENDATION_DB_USER:-recommendationuser} -d ${RECOMMENDATION_DB_NAME:-recommendationdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── OpenSearch ────────────────────────────────────────────────────────────
  # Heap increased from 512 m to 1 g.  Rule: heap = min(half RAM on node, 31 g).
  # At 1 g the JVM stays well below compressed-OOP threshold (~31 g) and has
  # enough room for field-data caches and segment buffers at scale.

  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_VERSION:-2.13.0}
    container_name: opensearch
    networks: [music-net]
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "${OPENSEARCH_JAVA_OPTS:--Xms768m -Xmx768m -XX:G1ReservePercent=10}"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${OPENSEARCH_HOST_PORT:-9200}:9200"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  # ── ClickHouse ────────────────────────────────────────────────────────────
  # Resource limits added.  Without limits ClickHouse can claim all host RAM
  # during a write-heavy load test.

  clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-24.3}
    container_name: clickhouse
    networks: [music-net]
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analyticsdb}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-analyticsuser}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-analyticspass}
    ports:
      - "${CLICKHOUSE_HTTP_HOST_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_HOST_PORT:-9000}:9000"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4g
        reservations:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q 'Ok.' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Redis ─────────────────────────────────────────────────────────────────
  # maxmemory: recommendation cache peaks at ~200 MB for 100 K active users;
  #   512 MB gives 2.5× headroom before eviction kicks in.
  # allkeys-lru: evict least-recently-used keys when full, matching TTL workload.
  # --save "": RDB snapshots disabled; Redis is a pure in-memory cache.
  # AOF persistence intentionally omitted: catalog and recommendation caches
  #   are rebuilt automatically on restart (catalog from PG, recs from Kafka).

  redis:
    image: redis:${REDIS_VERSION:-7.2-alpine}
    container_name: redis
    networks: [music-net]
    volumes:
      - redis-data:/data
    command: >
      redis-server
        --maxmemory ${REDIS_MAXMEMORY:-512mb}
        --maxmemory-policy allkeys-lru
        --save ""
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MongoDB ───────────────────────────────────────────────────────────────

  mongodb:
    image: mongo:${MONGO_VERSION:-7.0}
    container_name: mongodb
    networks: [music-net]
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongouser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongopass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-notificationdb}
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "mongosh --username \"$$MONGO_INITDB_ROOT_USERNAME\" --password \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 })' --quiet || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── nginx load balancer ───────────────────────────────────────────────────
  # Single entry point for all backend API traffic (k6 direct).
  # Uses Docker's embedded DNS resolver
  # (127.0.0.11) with a 5-second TTL so newly scaled replicas are picked up
  # without an nginx reload.  Rate limiting and access logging are applied here.

  nginx-lb:
    image: nginx:1.25-alpine
    container_name: nginx-lb
    networks: [music-net]
    volumes:
      - ./infra/nginx-lb/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_LB_HOST_PORT:-80}:80"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── Prometheus ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v2.51.2}
    container_name: prometheus
    networks: [music-net]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=3d'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Grafana ───────────────────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-10.4.2}
    container_name: grafana
    networks: [music-net]
    depends_on:
      prometheus:
        condition: service_healthy
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Prometheus exporters ──────────────────────────────────────────────────
  # These expose database and infrastructure metrics for Grafana dashboards.
  # They are lightweight and have no hard dependencies beyond the target service.

  postgres-exporter-auth:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter-auth
    networks: [music-net]
    environment:
      DATA_SOURCE_NAME: "postgresql://${AUTH_DB_USER:-authuser}:${AUTH_DB_PASSWORD:-authpass}@auth-db:5432/${AUTH_DB_NAME:-authdb}?sslmode=disable"
    depends_on:
      auth-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64m

  postgres-exporter-catalog:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter-catalog
    networks: [music-net]
    environment:
      DATA_SOURCE_NAME: "postgresql://${CATALOG_DB_USER:-cataloguser}:${CATALOG_DB_PASSWORD:-catalogpass}@catalog-db:5432/${CATALOG_DB_NAME:-catalogdb}?sslmode=disable"
    depends_on:
      catalog-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64m

  postgres-exporter-playlist:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter-playlist
    networks: [music-net]
    environment:
      DATA_SOURCE_NAME: "postgresql://${PLAYLIST_DB_USER:-playlistuser}:${PLAYLIST_DB_PASSWORD:-playlistpass}@playlist-db:5432/${PLAYLIST_DB_NAME:-playlistdb}?sslmode=disable"
    depends_on:
      playlist-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64m

  postgres-exporter-recommendation:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter-recommendation
    networks: [music-net]
    environment:
      DATA_SOURCE_NAME: "postgresql://${RECOMMENDATION_DB_USER:-recommendationuser}:${RECOMMENDATION_DB_PASSWORD:-recommendationpass}@recommendation-db:5432/${RECOMMENDATION_DB_NAME:-recommendationdb}?sslmode=disable"
    depends_on:
      recommendation-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64m

  redis-exporter:
    image: oliver006/redis_exporter:v1.60.0
    container_name: redis-exporter
    networks: [music-net]
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64m

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: kafka-exporter
    networks: [music-net]
    command:
      - "--kafka.server=kafka:9092"
      - "--web.listen-address=:9308"
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128m

  # ── Application services ──────────────────────────────────────────────────
  # container_name is intentionally omitted from all application services so
  # that `docker compose up --scale <service>=N` works without conflicts.
  #
  # Ports are intentionally omitted; all API traffic enters via nginx-lb:80.
  # To inspect a specific replica directly, use `docker compose exec <service>`.
  #
  # HikariCP pool is tuned so that (replicas × pool_size) stays well below
  # PostgreSQL max_connections (200).  At 4 replicas × 20 connections = 80,
  # leaving room for DBA queries and exporter connections.
  #
  # All services that mount jwt-keys:ro depend on auth-service being healthy
  # so that RSA key files are guaranteed to exist before they are read.

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    networks: [music-net]
    depends_on:
      auth-db:
        condition: service_healthy
    volumes:
      - jwt-keys:/jwt-keys
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/${AUTH_DB_NAME:-authdb}
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER:-authuser}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASSWORD:-authpass}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${AUTH_DB_POOL_SIZE:-20}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 30000
      JWT_KEY_DIR: /jwt-keys
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
    deploy:
      replicas: ${AUTH_SERVICE_REPLICAS:-1}
      resources:
        limits:
          cpus: "${AUTH_SERVICE_CPU_LIMIT:-1.5}"
          memory: "${AUTH_SERVICE_MEMORY_LIMIT:-512m}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    networks: [music-net]
    depends_on:
      catalog-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    volumes:
      - jwt-keys:/jwt-keys:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://catalog-db:5432/${CATALOG_DB_NAME:-catalogdb}
      SPRING_DATASOURCE_USERNAME: ${CATALOG_DB_USER:-cataloguser}
      SPRING_DATASOURCE_PASSWORD: ${CATALOG_DB_PASSWORD:-catalogpass}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${CATALOG_DB_POOL_SIZE:-20}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 2
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 30000
      JWT_PUBLIC_KEY_PATH: /jwt-keys/public.pem
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CATALOG_CACHE_TTL_SECONDS: ${CATALOG_CACHE_TTL_SECONDS:-300}
    deploy:
      replicas: ${CATALOG_SERVICE_REPLICAS:-2}
      resources:
        limits:
          cpus: "${CATALOG_SERVICE_CPU_LIMIT:-1.0}"
          memory: "${CATALOG_SERVICE_MEMORY_LIMIT:-512m}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  streaming-service:
    build:
      context: ./services/streaming-service
      dockerfile: Dockerfile
    networks: [music-net]
    depends_on:
      kafka:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
      auth-service:
        condition: service_healthy
    volumes:
      - jwt-keys:/jwt-keys:ro
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_PUBLIC_KEY_PATH: /jwt-keys/public.pem
      STREAM_SEGMENT_SIZE_BYTES: ${STREAM_SEGMENT_SIZE_BYTES:-4096}
      STREAM_SEGMENT_COUNT: ${STREAM_SEGMENT_COUNT:-10}
      KAFKA_TOPIC_PLAYBACK_EVENTS: ${KAFKA_TOPIC_PLAYBACK_EVENTS:-playback-events}
    deploy:
      replicas: ${STREAMING_SERVICE_REPLICAS:-3}
      resources:
        limits:
          cpus: "${STREAMING_SERVICE_CPU_LIMIT:-1.0}"
