      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── Load generator (opt-in profile) ──────────────────────────────────────
  # Routes all benchmark traffic through nginx-lb (NGINX_LB_URL) to measure
  # realistic system performance including proxy overhead and rate limiting.
  # Individual service URLs are retained for targeted debugging runs.
  # K6_SCENARIO selects the test phase: smoke | catalog_stream | kafka_pipeline
  #   | ramp | stress | soak  (default: ramp)

  load-generator:
    build:
      context: ./load-generator
      dockerfile: Dockerfile
    container_name: load-generator
    networks: [music-net]
    depends_on:
      nginx-lb:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      streaming-service:
        condition: service_healthy
      playlist-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      recommendation-service:
        condition: service_healthy
    environment:
      # Primary entry point — routes through nginx-lb for realistic load distribution
      NGINX_LB_URL: http://nginx-lb
      # Direct service URLs for targeted health checks and bypass scenarios
      AUTH_SERVICE_URL: http://auth-service:8080
      CATALOG_SERVICE_URL: http://catalog-service:8080
      STREAMING_SERVICE_URL: http://streaming-service:8080
      PLAYLIST_SERVICE_URL: http://playlist-service:8080
      SEARCH_SERVICE_URL: http://search-service:8080
      ANALYTICS_SERVICE_URL: http://analytics-service:8080
      RECOMMENDATION_SERVICE_URL: http://recommendation-service:8080
      # k6 scenario selector (K6_SCENARIOS read by main.js; no K6_VUS/K6_DURATION to avoid overriding options.scenarios)
      K6_SCENARIO: ${K6_SCENARIO:-ramp}
      K6_SCENARIOS: ${K6_SCENARIOS:-all}
    profiles:
      - load-test
    deploy:
      resources:
        limits:
          cpus: "${LOAD_GENERATOR_CPU_LIMIT:-2.0}"
          memory: "${LOAD_GENERATOR_MEMORY_LIMIT:-2048m}"
