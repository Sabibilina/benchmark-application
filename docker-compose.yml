networks:
  music-net:
    driver: bridge

volumes:
  jwt-keys:
  auth-db-data:
  catalog-db-data:
  playlist-db-data:
  recommendation-db-data:
  opensearch-data:
  clickhouse-data:
  redis-data:
  mongo-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
  prometheus-data:
  grafana-data:

services:

  # ── Zookeeper ─────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:${CONFLUENT_VERSION:-7.6.0}
    container_name: zookeeper
    networks: [music-net]
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_HOST_PORT:-2181}:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "${ZOOKEEPER_CPU_LIMIT:-0.5}"
          memory: "${ZOOKEEPER_MEMORY_LIMIT:-512m}"

  # ── Kafka ─────────────────────────────────────────────────────────────────

  kafka:
    image: confluentinc/cp-kafka:${CONFLUENT_VERSION:-7.6.0}
    container_name: kafka
    networks: [music-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT:-29092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24
    ports:
      - "${KAFKA_HOST_PORT:-29092}:29092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${KAFKA_CPU_LIMIT:-2.0}"
          memory: "${KAFKA_MEMORY_LIMIT:-2g}"

  # ── Init Kafka (one-shot topic creation) ──────────────────────────────────

  init-kafka:
    image: confluentinc/cp-kafka:${CONFLUENT_VERSION:-7.6.0}
    container_name: init-kafka
    networks: [music-net]
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic ${KAFKA_TOPIC_PLAYBACK_EVENTS:-playback-events} \
        --partitions ${KAFKA_PLAYBACK_PARTITIONS:-12} \
        --replication-factor ${KAFKA_REPLICATION_FACTOR:-1}
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
        --topic ${KAFKA_TOPIC_PLAYLIST_EVENTS:-playlist-events} \
        --partitions ${KAFKA_PLAYLIST_PARTITIONS:-6} \
        --replication-factor ${KAFKA_REPLICATION_FACTOR:-1}
      echo 'Kafka topics ready'
      "
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "256m"

  # ── PostgreSQL databases (one per service) ────────────────────────────────

  auth-db:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: auth-db
    networks: [music-net]
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-authdb}
      POSTGRES_USER: ${AUTH_DB_USER:-authuser}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-authpass}
    command: >
      postgres
      -c shared_buffers=${AUTH_DB_SHARED_BUFFERS:-128MB}
      -c work_mem=${AUTH_DB_WORK_MEM:-8MB}
      -c max_connections=${AUTH_DB_MAX_CONNECTIONS:-200}
    ports:
      - "${AUTH_DB_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-authuser} -d ${AUTH_DB_NAME:-authdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${AUTH_DB_CPU_LIMIT:-1.0}"
          memory: "${AUTH_DB_MEMORY_LIMIT:-512m}"

  catalog-db:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: catalog-db
    networks: [music-net]
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${CATALOG_DB_NAME:-catalogdb}
      POSTGRES_USER: ${CATALOG_DB_USER:-cataloguser}
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD:-catalogpass}
    command: >
      postgres
      -c shared_buffers=${CATALOG_DB_SHARED_BUFFERS:-256MB}
      -c work_mem=${CATALOG_DB_WORK_MEM:-8MB}
      -c max_connections=${CATALOG_DB_MAX_CONNECTIONS:-200}
    ports:
      - "${CATALOG_DB_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CATALOG_DB_USER:-cataloguser} -d ${CATALOG_DB_NAME:-catalogdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${CATALOG_DB_CPU_LIMIT:-1.0}"
          memory: "${CATALOG_DB_MEMORY_LIMIT:-512m}"

  playlist-db:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: playlist-db
    networks: [music-net]
    volumes:
      - playlist-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${PLAYLIST_DB_NAME:-playlistdb}
      POSTGRES_USER: ${PLAYLIST_DB_USER:-playlistuser}
      POSTGRES_PASSWORD: ${PLAYLIST_DB_PASSWORD:-playlistpass}
    command: >
      postgres
      -c shared_buffers=${PLAYLIST_DB_SHARED_BUFFERS:-128MB}
      -c work_mem=${PLAYLIST_DB_WORK_MEM:-8MB}
      -c max_connections=${PLAYLIST_DB_MAX_CONNECTIONS:-200}
    ports:
      - "${PLAYLIST_DB_HOST_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLAYLIST_DB_USER:-playlistuser} -d ${PLAYLIST_DB_NAME:-playlistdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${PLAYLIST_DB_CPU_LIMIT:-1.0}"
          memory: "${PLAYLIST_DB_MEMORY_LIMIT:-512m}"

  recommendation-db:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: recommendation-db
    networks: [music-net]
    volumes:
      - recommendation-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${RECOMMENDATION_DB_NAME:-recommendationdb}
      POSTGRES_USER: ${RECOMMENDATION_DB_USER:-recommendationuser}
      POSTGRES_PASSWORD: ${RECOMMENDATION_DB_PASSWORD:-recommendationpass}
    command: >
      postgres
      -c shared_buffers=${RECOMMENDATION_DB_SHARED_BUFFERS:-128MB}
      -c work_mem=${RECOMMENDATION_DB_WORK_MEM:-8MB}
      -c max_connections=${RECOMMENDATION_DB_MAX_CONNECTIONS:-200}
    ports:
      - "${RECOMMENDATION_DB_HOST_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RECOMMENDATION_DB_USER:-recommendationuser} -d ${RECOMMENDATION_DB_NAME:-recommendationdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${RECOMMENDATION_DB_CPU_LIMIT:-1.0}"
          memory: "${RECOMMENDATION_DB_MEMORY_LIMIT:-512m}"

  # ── OpenSearch ────────────────────────────────────────────────────────────

  opensearch:
    image: opensearchproject/opensearch:${OPENSEARCH_VERSION:-2.13.0}
    container_name: opensearch
    networks: [music-net]
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms${OPENSEARCH_HEAP:-1g} -Xmx${OPENSEARCH_HEAP:-1g}"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "${OPENSEARCH_HOST_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "${OPENSEARCH_CPU_LIMIT:-2.0}"
          memory: "${OPENSEARCH_MEMORY_LIMIT:-3g}"

  # ── ClickHouse ────────────────────────────────────────────────────────────

  clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-24.3}
    container_name: clickhouse
    networks: [music-net]
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analyticsdb}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-analyticsuser}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-analyticspass}
    ports:
      - "${CLICKHOUSE_HTTP_HOST_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_HOST_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q 'Ok.' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "${CLICKHOUSE_CPU_LIMIT:-2.0}"
          memory: "${CLICKHOUSE_MEMORY_LIMIT:-4g}"
        reservations:
          memory: "${CLICKHOUSE_MEMORY_RESERVATION:-2g}"

  # ── Redis ─────────────────────────────────────────────────────────────────

  redis:
    image: redis:${REDIS_VERSION:-7.2-alpine}
    container_name: redis
    networks: [music-net]
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT:-0.5}"
          memory: "${REDIS_MEMORY_LIMIT:-512m}"

  # ── MongoDB ───────────────────────────────────────────────────────────────

  mongodb:
    image: mongo:${MONGO_VERSION:-7.0}
    container_name: mongodb
    networks: [music-net]
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongouser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongopass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-notificationdb}
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --username \"$$MONGO_INITDB_ROOT_USERNAME\" --password \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval 'db.runCommand({ ping: 1 })' --quiet || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${MONGO_CPU_LIMIT:-1.0}"
          memory: "${MONGO_MEMORY_LIMIT:-1g}"

  # ── Prometheus exporters ──────────────────────────────────────────────────

  auth-db-exporter:
    image: prometheuscommunity/postgres-exporter:${PG_EXPORTER_VERSION:-v0.15.0}
    container_name: auth-db-exporter
    networks: [music-net]
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://${AUTH_DB_USER:-authuser}:${AUTH_DB_PASSWORD:-authpass}@auth-db:5432/${AUTH_DB_NAME:-authdb}?sslmode=disable"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "64m"

  catalog-db-exporter:
    image: prometheuscommunity/postgres-exporter:${PG_EXPORTER_VERSION:-v0.15.0}
    container_name: catalog-db-exporter
    networks: [music-net]
    depends_on:
      catalog-db:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://${CATALOG_DB_USER:-cataloguser}:${CATALOG_DB_PASSWORD:-catalogpass}@catalog-db:5432/${CATALOG_DB_NAME:-catalogdb}?sslmode=disable"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "64m"

  playlist-db-exporter:
    image: prometheuscommunity/postgres-exporter:${PG_EXPORTER_VERSION:-v0.15.0}
    container_name: playlist-db-exporter
    networks: [music-net]
    depends_on:
      playlist-db:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://${PLAYLIST_DB_USER:-playlistuser}:${PLAYLIST_DB_PASSWORD:-playlistpass}@playlist-db:5432/${PLAYLIST_DB_NAME:-playlistdb}?sslmode=disable"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "64m"

  recommendation-db-exporter:
    image: prometheuscommunity/postgres-exporter:${PG_EXPORTER_VERSION:-v0.15.0}
    container_name: recommendation-db-exporter
    networks: [music-net]
    depends_on:
      recommendation-db:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://${RECOMMENDATION_DB_USER:-recommendationuser}:${RECOMMENDATION_DB_PASSWORD:-recommendationpass}@recommendation-db:5432/${RECOMMENDATION_DB_NAME:-recommendationdb}?sslmode=disable"
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "64m"

  redis-exporter:
    image: oliver006/redis_exporter:${REDIS_EXPORTER_VERSION:-v1.61.0}
    container_name: redis-exporter
    networks: [music-net]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis://redis:6379
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "32m"

  kafka-exporter:
    image: danielqsj/kafka-exporter:${KAFKA_EXPORTER_VERSION:-v1.7.0}
    container_name: kafka-exporter
    networks: [music-net]
    depends_on:
      kafka:
        condition: service_healthy
    command: ["--kafka.server=kafka:9092"]
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "64m"

  mongodb-exporter:
    image: percona/mongodb_exporter:${MONGODB_EXPORTER_VERSION:-0.40.0}
    container_name: mongodb-exporter
    networks: [music-net]
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: "mongodb://${MONGO_USER:-mongouser}:${MONGO_PASSWORD:-mongopass}@mongodb:27017/admin"
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "64m"

  # ── Prometheus ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v2.51.2}
    container_name: prometheus
    networks: [music-net]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Grafana ───────────────────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-10.4.2}
    container_name: grafana
    networks: [music-net]
    depends_on:
      prometheus:
        condition: service_healthy
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── nginx load balancer ───────────────────────────────────────────────────

  nginx-lb:
    image: nginx:${NGINX_VERSION:-1.27-alpine}
    container_name: nginx-lb
    networks: [music-net]
    volumes:
      - ./infra/nginx-lb/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_LB_HOST_PORT:-80}:80"
    deploy:
      resources:
        limits:
          cpus: "${NGINX_LB_CPU_LIMIT:-0.5}"
          memory: "${NGINX_LB_MEMORY_LIMIT:-128m}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Application services ──────────────────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    networks: [music-net]
    depends_on:
      auth-db:
        condition: service_healthy
    volumes:
      - jwt-keys:/jwt-keys
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/${AUTH_DB_NAME:-authdb}
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER:-authuser}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASSWORD:-authpass}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${HIKARI_MAX_POOL_SIZE:-10}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${HIKARI_MIN_IDLE:-2}
      JWT_KEY_DIR: /jwt-keys
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
    deploy:
      replicas: ${AUTH_SERVICE_REPLICAS:-1}
      resources:
        limits:
          cpus: "${AUTH_SERVICE_CPU_LIMIT:-1.0}"
          memory: "${AUTH_SERVICE_MEMORY_LIMIT:-512m}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  catalog-service:
    build:
      context: ./services/catalog-service
      dockerfile: Dockerfile
    networks: [music-net]
    depends_on:
      catalog-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    volumes:
      - jwt-keys:/jwt-keys:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://catalog-db:5432/${CATALOG_DB_NAME:-catalogdb}
      SPRING_DATASOURCE_USERNAME: ${CATALOG_DB_USER:-cataloguser}
      SPRING_DATASOURCE_PASSWORD: ${CATALOG_DB_PASSWORD:-catalogpass}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${HIKARI_MAX_POOL_SIZE:-10}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${HIKARI_MIN_IDLE:-2}
      JWT_PUBLIC_KEY_PATH: /jwt-keys/public.pem
    deploy:
      replicas: ${CATALOG_SERVICE_REPLICAS:-1}
      resources:
        limits:
          cpus: "${CATALOG_SERVICE_CPU_LIMIT:-1.0}"
          memory: "${CATALOG_SERVICE_MEMORY_LIMIT:-512m}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  streaming-service:
    build:
      context: ./services/streaming-service
      dockerfile: Dockerfile
    networks: [music-net]
    depends_on:
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    volumes:
      - jwt-keys:/jwt-keys:ro
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_PUBLIC_KEY_PATH: /jwt-keys/public.pem
      STREAM_SEGMENT_SIZE_BYTES: ${STREAM_SEGMENT_SIZE_BYTES:-65536}
      STREAM_SEGMENT_COUNT: ${STREAM_SEGMENT_COUNT:-10}
      KAFKA_TOPIC_PLAYBACK_EVENTS: ${KAFKA_TOPIC_PLAYBACK_EVENTS:-playback-events}
    deploy:
      replicas: ${STREAMING_SERVICE_REPLICAS:-1}
      resources:
        limits:
          cpus: "${STREAMING_SERVICE_CPU_LIMIT:-1.0}"
          memory: "${STREAMING_SERVICE_MEMORY_LIMIT:-512m}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  playlist-service:
    build:
      context: ./services/playlist-service
      dockerfile: Dockerfile
    networks: [music-net]
    depends_on:
      playlist-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    volumes:
      - jwt-keys:/jwt-keys:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://playlist-db:5432/${PLAYLIST_DB_NAME:-playlistdb}
      SPRING_DATASOURCE_USERNAME: ${PLAYLIST_DB_USER:-playlistuser}
      SPRING_DATASOURCE_PASSWORD: ${PLAYLIST_DB_PASSWORD:-playlistpass}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${HIKARI_MAX_POOL_SIZE:-10}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${HIKARI_MIN_IDLE:-2}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_PUBLIC_KEY_PATH: /jwt-keys/public.pem
    deploy:
      replicas: ${PLAYLIST_SERVICE_REPLICAS:-1}
      resources:
        limits:
          cpus: "${PLAYLIST_SERVICE_CPU_LIMIT:-1.0}"
          memory: "${PLAYLIST_SERVICE_MEMORY_LIMIT:-512m}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  search-service:
    build:
      context: ./services/search-service
      dockerfile: Dockerfile
    networks: [music-net]
    depends_on:
      opensearch:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    volumes:
      - jwt-keys:/jwt-keys:ro
    environment:
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
      OPENSEARCH_INDEX_NAME: songs
      JWT_PUBLIC_KEY_PATH: /jwt-keys/public.pem
      SEARCH_MAX_RESULTS: ${SEARCH_MAX_RESULTS:-20}
      SEARCH_SEED_ENABLED: "true"
      SEARCH_SEED_BATCH_SIZE: ${SEARCH_SEED_BATCH_SIZE:-500}
    deploy:
      replicas: ${SEARCH_SERVICE_REPLICAS:-1}
      resources:
        limits:
          cpus: "${SEARCH_SERVICE_CPU_LIMIT:-1.0}"
          memory: "${SEARCH_SERVICE_MEMORY_LIMIT:-512m}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    networks: [music-net]
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    volumes:
      - jwt-keys:/jwt-keys:ro
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_HTTP_PORT: 8123
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analyticsdb}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-analyticsuser}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-analyticspass}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_PLAYBACK_EVENTS: ${KAFKA_TOPIC_PLAYBACK_EVENTS:-playback-events}
      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:-analytics-service}
      ANALYTICS_HISTORY_LIMIT: ${ANALYTICS_HISTORY_LIMIT:-100}
      ANALYTICS_BATCH_SIZE: ${ANALYTICS_BATCH_SIZE:-500}
      ANALYTICS_BATCH_FLUSH_MS: ${ANALYTICS_BATCH_FLUSH_MS:-5000}
      JWT_PUBLIC_KEY_PATH: /jwt-keys/public.pem
    deploy:
      replicas: ${ANALYTICS_SERVICE_REPLICAS:-1}
      resources:
        limits:
          cpus: "${ANALYTICS_SERVICE_CPU_LIMIT:-1.0}"
          memory: "${ANALYTICS_SERVICE_MEMORY_LIMIT:-512m}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  recommendation-service:
    build:
      context: ./services/recommendation-service
      dockerfile: Dockerfile
    networks: [music-net]
    depends_on:
      recommendation-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    volumes:
      - jwt-keys:/jwt-keys:ro
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://recommendation-db:5432/${RECOMMENDATION_DB_NAME:-recommendationdb}
      SPRING_DATASOURCE_USERNAME: ${RECOMMENDATION_DB_USER:-recommendationuser}
      SPRING_DATASOURCE_PASSWORD: ${RECOMMENDATION_DB_PASSWORD:-recommendationpass}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${HIKARI_MAX_POOL_SIZE:-10}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${HIKARI_MIN_IDLE:-2}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_PUBLIC_KEY_PATH: /jwt-keys/public.pem
      KAFKA_TOPIC_PLAYBACK_EVENTS: ${KAFKA_TOPIC_PLAYBACK_EVENTS:-playback-events}
      KAFKA_CONSUMER_GROUP_ID: ${RECOMMENDATION_KAFKA_CONSUMER_GROUP_ID:-recommendation-service}
      RECOMMENDATION_DAILY_MIX_SIZE: ${RECOMMENDATION_DAILY_MIX_SIZE:-20}
      RECOMMENDATION_SIMILAR_SIZE: ${RECOMMENDATION_SIMILAR_SIZE:-10}
      RECOMMENDATION_CACHE_TTL_SECONDS: ${RECOMMENDATION_CACHE_TTL_SECONDS:-3600}
    deploy:
      replicas: ${RECOMMENDATION_SERVICE_REPLICAS:-1}
      resources:
        limits:
          cpus: "${RECOMMENDATION_SERVICE_CPU_LIMIT:-1.0}"
          memory: "${RECOMMENDATION_SERVICE_MEMORY_LIMIT:-512m}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    networks: [music-net]
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully
    volumes:
      - jwt-keys:/jwt-keys:ro
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USER:-mongouser}:${MONGO_PASSWORD:-mongopass}@mongodb:27017/${MONGO_DB:-notificationdb}?authSource=admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_PLAYLIST_EVENTS: ${KAFKA_TOPIC_PLAYLIST_EVENTS:-playlist-events}
      KAFKA_CONSUMER_GROUP_ID: ${NOTIFICATION_KAFKA_CONSUMER_GROUP_ID:-notification-service}
      JWT_PUBLIC_KEY_PATH: /jwt-keys/public.pem
    deploy:
      replicas: ${NOTIFICATION_SERVICE_REPLICAS:-1}
      resources:
        limits:
          cpus: "${NOTIFICATION_SERVICE_CPU_LIMIT:-1.0}"
          memory: "${NOTIFICATION_SERVICE_MEMORY_LIMIT:-512m}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── Load generator (opt-in profile) ──────────────────────────────────────

  load-generator:
    build:
      context: ./load-generator
      dockerfile: Dockerfile
    container_name: load-generator
    networks: [music-net]
    depends_on:
      nginx-lb:
        condition: service_healthy
    environment:
      NGINX_LB_URL: http://nginx-lb:80
      AUTH_SERVICE_URL: http://auth-service:8080
      CATALOG_SERVICE_URL: http://catalog-service:8080
      STREAMING_SERVICE_URL: http://streaming-service:8080
      PLAYLIST_SERVICE_URL: http://playlist-service:8080
      SEARCH_SERVICE_URL: http://search-service:8080
      ANALYTICS_SERVICE_URL: http://analytics-service:8080
      RECOMMENDATION_SERVICE_URL: http://recommendation-service:8080
      K6_VUS: ${K6_VUS:-10}
      K6_DURATION: ${K6_DURATION:-60s}
      K6_SCENARIO: ${K6_SCENARIO:-full}
    profiles:
      - load-test
    deploy:
      resources:
        limits:
          cpus: "${LOAD_GENERATOR_CPU_LIMIT:-2.0}"
          memory: "${LOAD_GENERATOR_MEMORY_LIMIT:-512m}"
