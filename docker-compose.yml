x-svc-limits: &svc-limits
  deploy:
    resources:
      limits:
        cpus: "0.50"
        memory: "512M"

x-db-limits: &db-limits
  deploy:
    resources:
      limits:
        cpus: "0.25"
        memory: "256M"

x-infra-limits: &infra-limits
  deploy:
    resources:
      limits:
        cpus: "0.25"
        memory: "256M"

networks:
  musicapp-net:
    driver: bridge

volumes:
  pgdata-auth:
  pgdata-catalog:
  pgdata-playlist:
  pgdata-search:
  pgdata-analytics:
  pgdata-recommendation:
  pgdata-notification:
  kafka-data:
  minio-data:
  prometheus-data:
  grafana-data:

services:

  # ── Persistence ──────────────────────────────────────────────────────────────

  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: auth
    volumes:
      - pgdata-auth:/var/lib/postgresql/data
    networks:
      - musicapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *db-limits

  postgres-catalog:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: catalog
    volumes:
      - pgdata-catalog:/var/lib/postgresql/data
    networks:
      - musicapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *db-limits

  postgres-playlist:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: playlist
    volumes:
      - pgdata-playlist:/var/lib/postgresql/data
    networks:
      - musicapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *db-limits

  postgres-search:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: search
    volumes:
      - pgdata-search:/var/lib/postgresql/data
    networks:
      - musicapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *db-limits

  postgres-analytics:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: analytics
    volumes:
      - pgdata-analytics:/var/lib/postgresql/data
    networks:
      - musicapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *db-limits

  postgres-recommendation:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: recommendation
    volumes:
      - pgdata-recommendation:/var/lib/postgresql/data
    networks:
      - musicapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *db-limits

  postgres-notification:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: notification
    volumes:
      - pgdata-notification:/var/lib/postgresql/data
    networks:
      - musicapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *db-limits

  # ── Message Broker (KRaft mode — no ZooKeeper required) ──────────────────────

  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    networks:
      - musicapp-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9092' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped
    <<: *infra-limits

  # ── Object Storage ────────────────────────────────────────────────────────────

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - musicapp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *infra-limits

  # ── Monitoring ────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - musicapp-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *infra-limits

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3100:3000"
    networks:
      - musicapp-net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *infra-limits

  # ── Application Services ──────────────────────────────────────────────────────
  # Requires: config/jwt/private.pem and config/jwt/public.pem (run config/jwt/keygen.sh first)

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-changeme}@postgres-auth:5432/auth
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public
    volumes:
      - ./config/jwt/private.pem:/run/secrets/jwt_private:ro
      - ./config/jwt/public.pem:/run/secrets/jwt_public:ro
    ports:
      - "3001:3001"
    networks:
      - musicapp-net
    depends_on:
      postgres-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *svc-limits

  catalog:
    build:
      context: ./services/catalog
      dockerfile: Dockerfile
    environment:
      PORT: "3002"
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-changeme}@postgres-catalog:5432/catalog
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public
    volumes:
      - ./config/jwt/public.pem:/run/secrets/jwt_public:ro
    ports:
      - "3002:3002"
    networks:
      - musicapp-net
    depends_on:
      postgres-catalog:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *svc-limits

  streaming:
    build:
      context: ./services/streaming
      dockerfile: Dockerfile
    environment:
      PORT: "3003"
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - ./config/jwt/public.pem:/run/secrets/jwt_public:ro
    ports:
      - "3003:3003"
    networks:
      - musicapp-net
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *svc-limits

  playlist:
    build:
      context: ./services/playlist
      dockerfile: Dockerfile
    environment:
      PORT: "3004"
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-changeme}@postgres-playlist:5432/playlist
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    volumes:
      - ./config/jwt/public.pem:/run/secrets/jwt_public:ro
    ports:
      - "3004:3004"
    networks:
      - musicapp-net
    depends_on:
      postgres-playlist:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *svc-limits

  search:
    build:
      context: ./services/search
      dockerfile: Dockerfile
    environment:
      PORT: "3005"
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-changeme}@postgres-search:5432/search
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public
    volumes:
      - ./config/jwt/public.pem:/run/secrets/jwt_public:ro
    ports:
      - "3005:3005"
    networks:
      - musicapp-net
    depends_on:
      postgres-search:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3005/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *svc-limits

  analytics:
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    environment:
      PORT: "3006"
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-changeme}@postgres-analytics:5432/analytics
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    volumes:
      - ./config/jwt/public.pem:/run/secrets/jwt_public:ro
    ports:
      - "3006:3006"
    networks:
      - musicapp-net
    depends_on:
      postgres-analytics:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3006/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *svc-limits

  recommendation:
    build:
      context: ./services/recommendation
      dockerfile: Dockerfile
    environment:
      PORT: "3007"
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-changeme}@postgres-recommendation:5432/recommendation
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    volumes:
      - ./config/jwt/public.pem:/run/secrets/jwt_public:ro
    ports:
      - "3007:3007"
    networks:
      - musicapp-net
    depends_on:
      postgres-recommendation:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3007/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *svc-limits

  notification:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    environment:
      PORT: "3008"
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-changeme}@postgres-notification:5432/notification
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
    volumes:
      - ./config/jwt/public.pem:/run/secrets/jwt_public:ro
    ports:
      - "3008:3008"
    networks:
      - musicapp-net
    depends_on:
      postgres-notification:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3008/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *svc-limits

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - musicapp-net
    depends_on:
      - auth
      - catalog
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    <<: *svc-limits

  # ── Load Generator (run with: docker compose --profile load up load-generator) ─

  load-generator:
    build:
      context: ./load-generator
      dockerfile: Dockerfile
    environment:
      TARGET_AUTH_URL: http://auth:3001
      TARGET_CATALOG_URL: http://catalog:3002
      TARGET_STREAMING_URL: http://streaming:3003
      TARGET_PLAYLIST_URL: http://playlist:3004
      TARGET_SEARCH_URL: http://search:3005
      TARGET_ANALYTICS_URL: http://analytics:3006
    networks:
      - musicapp-net
    depends_on:
      - auth
      - catalog
      - streaming
      - playlist
      - search
      - analytics
    profiles:
      - load
    <<: *svc-limits
