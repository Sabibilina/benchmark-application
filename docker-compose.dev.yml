# docker-compose.dev.yml
#
# Development / e2e-test overlay.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build -d
#
# What this overlay does:
#   1. Exposes individual service host ports (8081-8088) so the e2e tests in
#      e2e-tests/ can reach each service at localhost:<port>.
#   2. Forces each service to 1 replica.  The base compose file has replicas > 1
#      for several services; a fixed port mapping (e.g., 8082:8080) can only
#      bind once — the second replica would fail to start with "port already
#      allocated".  Replicas: 1 makes the port binding unambiguous.

services:
  auth-service:
    ports:
      - "${AUTH_SERVICE_HOST_PORT:-8081}:8080"

  catalog-service:
    ports:
      - "${CATALOG_SERVICE_HOST_PORT:-8082}:8080"
    deploy:
      replicas: 1

  streaming-service:
    ports:
      - "${STREAMING_SERVICE_HOST_PORT:-8083}:8080"
    deploy:
      replicas: 1

  playlist-service:
    ports:
      - "${PLAYLIST_SERVICE_HOST_PORT:-8084}:8080"
    deploy:
      replicas: 1

  search-service:
    ports:
      - "${SEARCH_SERVICE_HOST_PORT:-8085}:8080"
    deploy:
      replicas: 1

  analytics-service:
    ports:
      - "${ANALYTICS_SERVICE_HOST_PORT:-8086}:8080"
    deploy:
      replicas: 1

  recommendation-service:
    ports:
      - "${RECOMMENDATION_SERVICE_HOST_PORT:-8087}:8080"
    deploy:
      replicas: 1

  notification-service:
    ports:
      - "${NOTIFICATION_SERVICE_HOST_PORT:-8088}:8080"
    deploy:
      replicas: 1
