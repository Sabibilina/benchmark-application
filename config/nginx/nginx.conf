worker_processes auto;

events {
    worker_connections 4096;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format benchmark '$remote_addr $request_method $uri $status '
                         '$request_time $upstream_response_time $upstream_addr';

    access_log /var/log/nginx/access.log benchmark;
    error_log /var/log/nginx/error.log warn;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 2s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    server {
        listen 8080;

        location = /health {
            access_log off;
            add_header X-Gateway benchmark-nginx;
            return 200 "ok\n";
        }

        location = /nginx_status {
            access_log off;
            stub_status;
        }

        location /auth/ {
            set $upstream http://auth-service:8080;
            proxy_pass $upstream;
        }

        location /catalog/ {
            set $upstream http://catalog-service:8080;
            proxy_pass $upstream;
        }

        location /stream/ {
            set $upstream http://streaming-service:8080;
            proxy_pass $upstream;
        }

        location /playlists {
            set $upstream http://playlist-service:8080;
            proxy_pass $upstream;
        }

        location /search {
            set $upstream http://search-service:8080;
            proxy_pass $upstream;
        }

        location /analytics/ {
            set $upstream http://analytics-service:8080;
            proxy_pass $upstream;
        }

        location /recommend/ {
            set $upstream http://recommendation-service:8080;
            proxy_pass $upstream;
        }

        location / {
            return 404;
        }
    }
}
