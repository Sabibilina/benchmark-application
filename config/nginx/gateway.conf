worker_processes auto;
worker_rlimit_nofile 200000;

events {
    worker_connections 65535;
    multi_accept on;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    log_format benchmark '$remote_addr - $request_id "$request" $status '
                         '$body_bytes_sent $request_time $upstream_response_time '
                         '"$http_user_agent"';

    access_log /var/log/nginx/access.log benchmark;
    error_log /var/log/nginx/error.log warn;

    keepalive_timeout 30s;
    keepalive_requests 1000;
    client_max_body_size 1m;
    proxy_connect_timeout 2s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;

    map $request_uri $cache_bypass {
        default 1;
        ~^/catalog/songs(\?|$) 0;
        ~^/analytics/charts/global(\?|$) 0;
    }

    proxy_cache_path /var/cache/nginx/benchmark
        levels=1:2
        keys_zone=benchmark_cache:20m
        max_size=256m
        inactive=2m
        use_temp_path=off;

    server {
        listen 8080;
        server_name _;

        add_header X-Gateway benchmark-nginx always;

        location = /health {
            access_log off;
            return 200 "ok\n";
        }

        location = /nginx_status {
            access_log off;
            stub_status;
        }

        location /auth/ {
            set $upstream auth-service:8080;
            proxy_pass http://$upstream;
            include /etc/nginx/proxy_params;
        }

        location /catalog/ {
            set $upstream catalog-service:8080;
            proxy_cache benchmark_cache;
            proxy_cache_bypass $cache_bypass;
            proxy_no_cache $cache_bypass;
            proxy_cache_valid 200 30s;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;
            proxy_ignore_headers Cache-Control Expires Set-Cookie;
            proxy_hide_header Set-Cookie;
            add_header Cache-Control "private, max-age=30" always;
            add_header X-Cache-Status $upstream_cache_status always;
            proxy_pass http://$upstream;
            include /etc/nginx/proxy_params;
        }

        location /stream/ {
            set $upstream streaming-service:8080;
            proxy_buffering off;
            proxy_read_timeout 60s;
            proxy_pass http://$upstream;
            include /etc/nginx/proxy_params;
        }

        location /playlists {
            set $upstream playlist-service:8080;
            proxy_pass http://$upstream;
            include /etc/nginx/proxy_params;
        }

        location /search {
            set $upstream search-service:8080;
            proxy_connect_timeout 1s;
            proxy_read_timeout 10s;
            proxy_pass http://$upstream;
            include /etc/nginx/proxy_params;
        }

        location /analytics/ {
            set $upstream analytics-service:8080;
            proxy_cache benchmark_cache;
            proxy_cache_bypass $cache_bypass;
            proxy_no_cache $cache_bypass;
            proxy_cache_valid 200 5s;
            add_header X-Cache-Status $upstream_cache_status always;
            proxy_pass http://$upstream;
            include /etc/nginx/proxy_params;
        }

        location /recommend/ {
            set $upstream recommendation-service:8080;
            proxy_pass http://$upstream;
            include /etc/nginx/proxy_params;
        }
    }
}
