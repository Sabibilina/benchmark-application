server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API routing through the dedicated load balancer ───────────────────────
    # All /api/* traffic is forwarded to nginx-lb, which handles replica
    # distribution, rate limiting, and access logging for all backend services.
    # Path rewriting matches the original direct-service mapping so the frontend
    # React app needs no changes.
    #
    # Pattern: strip the /api/<service-prefix>/ location, then prepend the
    # service's internal root path on nginx-lb.  nginx-lb uses Docker DNS with
    # resolver 127.0.0.11 and per-request re-resolution to distribute across
    # all running replicas of each service.

    location /api/auth/ {
        proxy_pass http://nginx-lb/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/catalog/ {
        proxy_pass http://nginx-lb/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/stream/ {
        proxy_pass http://nginx-lb/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/playlists/ {
        proxy_pass http://nginx-lb/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/search/ {
        proxy_pass http://nginx-lb/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/analytics/ {
        proxy_pass http://nginx-lb/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/recommend/ {
        proxy_pass http://nginx-lb/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/notifications/ {
        proxy_pass http://nginx-lb/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        default_type application/json;
        return 200 '{"status":"UP"}';
    }
}
