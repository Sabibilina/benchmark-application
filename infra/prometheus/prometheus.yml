global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [auth-service:8080]

  - job_name: catalog-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [catalog-service:8080]

  - job_name: streaming-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [streaming-service:8080]

  - job_name: playlist-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [playlist-service:8080]

  - job_name: search-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [search-service:8080]

  - job_name: analytics-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [analytics-service:8080]

  - job_name: recommendation-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [recommendation-service:8080]

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [notification-service:8080]
