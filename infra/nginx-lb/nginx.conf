worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Docker DNS resolver ────────────────────────────────────────────────────
    # Re-resolve upstream hostnames every 5 s so replicas added via
    # `docker compose up --scale` are discovered within one TTL window.
    # Using a variable in proxy_pass forces per-request DNS resolution.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # ── Rate-limit zones (per source IP) ──────────────────────────────────────
    # Raised for load-test accuracy: limits must not be lower than the k6
    # arrival-rate targets, or nginx rejects requests before they reach the
    # service and the measured bottleneck is the load balancer, not the SUT.
    #
    # auth:      500 r/s — setup registers/logs in ~200 users in a burst;
    #            steady-state auth scenario targets 45 iter/s.
    # streaming: 2000 r/s — target 100 iter/s × ~3 req/iter = ~300 r/s peak.
    # api:       2000 r/s — combined catalog+search+playlist+recommend peak.
    limit_req_zone $binary_remote_addr zone=auth_rl:10m    rate=500r/s;
    limit_req_zone $binary_remote_addr zone=stream_rl:10m  rate=2000r/s;
    limit_req_zone $binary_remote_addr zone=api_rl:10m     rate=2000r/s;

    log_format upstream_timing
        '$remote_addr [$time_local] "$request" $status $body_bytes_sent '
        'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log upstream_timing;

    sendfile       on;
    tcp_nopush     on;
    keepalive_timeout 65;

    # ── Proxy defaults ────────────────────────────────────────────────────────
    proxy_http_version  1.1;
    proxy_set_header    Connection         "";
    proxy_set_header    Host               $host;
    proxy_set_header    X-Real-IP          $remote_addr;
    proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;

    server {
        listen 80;
        listen [::]:80;

        # ── LB health check ───────────────────────────────────────────────────
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"UP","service":"nginx-lb"}';
        }

        # ── Auth service (/auth/*) ────────────────────────────────────────────
        location /auth/ {
            limit_req zone=auth_rl burst=500 nodelay;

            set $upstream_auth "auth-service:8080";
            proxy_pass         http://$upstream_auth;
            proxy_connect_timeout  5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Catalog service (/catalog/*) ──────────────────────────────────────
        # Read-heavy paginated queries; CPU-cheap per request.
        # Docker DNS round-robins across replicas added via --scale.
        location /catalog/ {
            limit_req zone=api_rl burst=2000 nodelay;

            set $upstream_catalog "catalog-service:8080";
            proxy_pass         http://$upstream_catalog;
            proxy_connect_timeout  5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Streaming service (/stream/*) ─────────────────────────────────────
        # Highest request volume in the system. Each request generates an HLS
        # manifest or a 64 KB segment payload. Proxy buffering disabled so bytes
        # are not held in nginx memory before forwarding.
        location /stream/ {
            limit_req zone=stream_rl burst=2000 nodelay;

            set $upstream_streaming "streaming-service:8080";
            proxy_pass         http://$upstream_streaming;
            proxy_connect_timeout  5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
            proxy_buffering       off;
        }

        # ── Playlist service (/playlists*) ────────────────────────────────────
        # Lower-frequency CRUD; produces Kafka events on every mutation.
        location /playlists {
            limit_req zone=api_rl burst=1000 nodelay;

            set $upstream_playlist "playlist-service:8080";
            proxy_pass         http://$upstream_playlist;
            proxy_connect_timeout  5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Search service (/search*) ─────────────────────────────────────────
        # IO-variable latency driven by OpenSearch query complexity.
        location /search {
            limit_req zone=api_rl burst=2000 nodelay;

            set $upstream_search "search-service:8080";
            proxy_pass         http://$upstream_search;
            proxy_connect_timeout  5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Analytics service (/analytics/*) ──────────────────────────────────
        location /analytics/ {
            limit_req zone=api_rl burst=1000 nodelay;

            set $upstream_analytics "analytics-service:8080";
            proxy_pass         http://$upstream_analytics;
            proxy_connect_timeout  5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Recommendation service (/recommend/*) ─────────────────────────────
        # Redis cache + PostgreSQL; latency varies with cache hit/miss.
        location /recommend/ {
            limit_req zone=api_rl burst=1000 nodelay;

            set $upstream_recommend "recommendation-service:8080";
            proxy_pass         http://$upstream_recommend;
            proxy_connect_timeout  5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ── Notification service (/notifications*) ────────────────────────────
        # Low-frequency; lowest traffic in the system.
        location /notifications {
            limit_req zone=api_rl burst=500 nodelay;

            set $upstream_notification "notification-service:8080";
            proxy_pass         http://$upstream_notification;
            proxy_connect_timeout  5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }
}
