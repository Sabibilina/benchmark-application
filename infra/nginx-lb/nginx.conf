worker_processes auto;

events {
    worker_connections 4096;
}

http {
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=20r/s;
    limit_req_zone $binary_remote_addr zone=stream_limit:10m rate=200r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=500r/s;

    # Common proxy settings
    proxy_http_version 1.1;
    proxy_set_header   Connection "";
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    server {
        listen 80;

        # Docker embedded DNS — re-resolves every 10s to discover new replicas
        resolver 127.0.0.11 valid=10s ipv6=off;

        # nginx-lb own health check
        location = /health {
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location /auth/ {
            limit_req zone=auth_limit burst=40 nodelay;
            set $upstream "auth-service:8080";
            proxy_pass http://$upstream;
        }

        location /catalog/ {
            limit_req zone=api_limit burst=1000 nodelay;
            set $upstream "catalog-service:8080";
            proxy_pass http://$upstream;
        }

        location /stream/ {
            limit_req zone=stream_limit burst=2000 nodelay;
            set $upstream "streaming-service:8080";
            proxy_pass http://$upstream;
        }

        location /playlists {
            limit_req zone=api_limit burst=500 nodelay;
            set $upstream "playlist-service:8080";
            proxy_pass http://$upstream;
        }

        location /search {
            limit_req zone=api_limit burst=1000 nodelay;
            set $upstream "search-service:8080";
            proxy_pass http://$upstream;
        }

        location /analytics/ {
            limit_req zone=api_limit burst=500 nodelay;
            set $upstream "analytics-service:8080";
            proxy_pass http://$upstream;
        }

        location /recommend/ {
            limit_req zone=api_limit burst=500 nodelay;
            set $upstream "recommendation-service:8080";
            proxy_pass http://$upstream;
        }

        location /notifications {
            limit_req zone=api_limit burst=200 nodelay;
            set $upstream "notification-service:8080";
            proxy_pass http://$upstream;
        }
    }
}
