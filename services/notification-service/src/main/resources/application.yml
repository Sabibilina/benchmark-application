spring:
  application:
    name: notification-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://benchmark:benchmark@notification-db:27017/notification?authSource=admin}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${NOTIFICATION_KAFKA_CONSUMER_GROUP_ID:notification-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.benchmark.notification.messaging
        spring.json.value.default.type: com.benchmark.notification.messaging.PlaylistUpdateEvent
        spring.json.use.type.headers: false
    listener:
      ack-mode: record

server:
  port: ${SERVER_PORT:8080}

app:
  notification:
    playlist-events-topic: ${NOTIFICATION_PLAYLIST_EVENTS_TOPIC:playlist-events}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
