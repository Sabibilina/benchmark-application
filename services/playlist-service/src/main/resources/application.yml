server:
  port: 8080

spring:
  application:
    name: playlist-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/playlistdb}
    username: ${SPRING_DATASOURCE_USERNAME:playlistuser}
    password: ${SPRING_DATASOURCE_PASSWORD:playlistpass}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        retry.backoff.ms: 1000
        max.in.flight.requests.per.connection: 1

jwt:
  public-key-path: ${JWT_PUBLIC_KEY_PATH:/jwt-keys/public.pem}

playlist:
  kafka:
    topic: ${PLAYLIST_KAFKA_TOPIC:playlist-events}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
