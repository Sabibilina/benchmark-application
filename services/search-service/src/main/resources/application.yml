server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: search-service

app:
  jwt:
    public-key-path: ${JWT_PUBLIC_KEY_PATH:/run/config/jwt/public.pem}
  search:
    opensearch-url: ${OPENSEARCH_URL:http://search-opensearch:9200}
    index-name: ${SEARCH_INDEX_NAME:songs}
    catalog-dataset-path: ${SEARCH_CATALOG_DATASET_PATH:/app/data/catalog.csv}
    indexing-enabled: ${SEARCH_INDEXING_ENABLED:true}
    indexing-batch-size: ${SEARCH_INDEX_BATCH_SIZE:500}
    default-page-size: ${SEARCH_DEFAULT_PAGE_SIZE:20}
    max-page-size: ${SEARCH_MAX_PAGE_SIZE:100}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
