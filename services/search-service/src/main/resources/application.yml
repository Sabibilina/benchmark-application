server:
  port: 8080

spring:
  application:
    name: search-service

opensearch:
  host: ${OPENSEARCH_HOST:localhost}
  port: ${OPENSEARCH_PORT:9200}
  index-name: ${OPENSEARCH_INDEX_NAME:songs}
  connect-timeout-ms: ${OPENSEARCH_CONNECT_TIMEOUT_MS:1000}
  socket-timeout-ms: ${OPENSEARCH_SOCKET_TIMEOUT_MS:15000}

search:
  max-results: ${SEARCH_MAX_RESULTS:20}
  seed:
    enabled: ${SEARCH_SEED_ENABLED:true}
    batch-size: ${SEARCH_SEED_BATCH_SIZE:500}

jwt:
  public-key-path: ${JWT_PUBLIC_KEY_PATH:/jwt-keys/public.pem}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
