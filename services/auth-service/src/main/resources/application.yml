server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://auth-db:5432/auth}
    username: ${SPRING_DATASOURCE_USERNAME:benchmark}
    password: ${SPRING_DATASOURCE_PASSWORD:benchmark}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:/run/secrets/jwt/private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:/run/config/jwt/public.pem}
    issuer: ${JWT_ISSUER:benchmark-auth}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT1H}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
